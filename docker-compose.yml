services:
  bridge:
    build: .
    command: python -m bridge          # live-reload by re-running; code is mounted
    env_file: .env
    # host networking: reach the host's Chrome on 127.0.0.1:9222 (loopback-bound,
    # unreachable from a normal bridge network) and serve the gateway on :8000.
    network_mode: host
    volumes:
      - .:/app                          # edit on host, run in container

  # ngrok tunnel — only with: docker compose --profile tunnel up
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["tunnel"]
    network_mode: host                  # talk to bridge on localhost:8000; inspector on :4040
    command: http localhost:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - bridge
